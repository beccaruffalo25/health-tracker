<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0F;font-family:-apple-system,system-ui,sans-serif;color:#F2F2F7;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
.app{max-width:480px;margin:0 auto;padding-bottom:52px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8E8E9A;font-size:14px">Loading…</div></div>
<script>
const T={bg:'#0A0A0F',card:'#14141C',card2:'#1C1C26',border:'#242432',green:'#30D158',blue:'#6B8EFF',gold:'#FFD60A',teal:'#00C9A7',warn:'#FF453A',text:'#F2F2F7',textSec:'#8E8E9A',textTer:'#48484E'};
const WE={'Lagree / Pilates':'🧘','Gym — weights':'🏋️','Cardio':'⚡','Walk':'🚶','Run':'🏃','Yoga':'🧘','Other':'✨'};
const CARD=()=>`background:${T.card};border-radius:18px;padding:16px 18px;border:1px solid ${T.border};margin-bottom:10px`;
const IS=()=>`width:100%;background:${T.card2};border:1px solid ${T.border};border-radius:12px;padding:12px 14px;font-size:14px;color:${T.text};outline:none;box-sizing:border-box;margin-bottom:14px`;

const today=()=>new Date().toISOString().split('T')[0];
const fmtTime=()=>new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const dayS=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
const dayN=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
function weekDays(){const n=new Date(),dy=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(dy===0?6:dy-1));return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d.toISOString().split('T')[0];});}
function last30(){return Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return d.toISOString().split('T')[0];});}
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const ls={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  raw:(k)=>{try{return localStorage.getItem(k)}catch{return null}},
  setRaw:(k,v)=>{try{localStorage.setItem(k,v)}catch{}}
};

async function callGemini(prompt,img=null){
  const key=localStorage.getItem('gemini_key');
  const parts=img?[{inline_data:{mime_type:img.mediaType,data:img.base64}},{text:prompt}]:[{text:prompt}];
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:0.1},thinkingConfig:{thinkingBudget:0}})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const rp=data.candidates[0].content.parts;const tp=rp.find(p=>!p.thought)||rp[rp.length-1];return tp.text;
}

const A={
  view:'today',tab:'meals',
  meals:[],workouts:[],
  burn:null,goals:{calories:1600,protein:100,water:64},
  mealText:'',aiLoading:false,photo:null,
  savedMeals:[],editId:null,editDraft:{},
  wf:{type:'',duration:'',notes:''},
  water:0,weights:[],showWeightInput:false,weightDraft:'',
  weekData:{},weekLoading:false,
  trends:[],trendLoading:false,
  insights:null,insightsLoading:false,
  modal:null,goalDraft:{calories:1600,protein:100,water:64},
  burnDraft:'',goalRec:null,goalRecLoading:false,fitGoal:'recomp',bodyWeight:''
};

function loadData(){
  const td=today();
  const m=ls.get(`meals:${td}`);if(m)A.meals=m;
  const w=ls.get(`workouts:${td}`);if(w)A.workouts=w;
  const g=ls.get('goals');if(g){A.goals=g;A.goalDraft={...g};}
  const sv=ls.get('savedMeals');if(sv)A.savedMeals=sv;
  const ins=ls.get(`insights:${td}`);if(ins)A.insights=ins;
  const b=ls.raw(`burn:${td}`);if(b)A.burn=Number(b);
  const wt=ls.raw(`water:${td}`);if(wt)A.water=Number(wt);
  const entries=[];last30().forEach(day=>{const r=ls.raw(`weight:${day}`);if(r)entries.push({date:day,weight:Number(r)});});
  A.weights=entries;
}

function ring(label,sublabel,current,max,color,unit,size=100){
  const r=size/2-10,circ=2*Math.PI*r,pct=max>0?Math.min(1,current/max):0,off=circ*(1-pct);
  const disp=typeof current==='number'?current.toLocaleString():current;
  return `<div style="text-align:center">
    <div style="position:relative;width:${size}px;height:${size}px;margin:0 auto">
      <svg width="${size}" height="${size}" style="transform:rotate(-90deg);overflow:visible">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${T.border}" stroke-width="8"/>
        ${pct>0?`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="filter:drop-shadow(0 0 10px ${color}90);transition:stroke-dashoffset 0.7s ease"/>`:''}
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:18px;font-weight:600;color:${T.text};letter-spacing:-0.02em;line-height:1">${disp}</div>
        ${unit?`<div style="font-size:9px;color:${T.textSec};margin-top:2px;text-transform:uppercase;letter-spacing:0.07em">${unit}</div>`:''}
      </div>
    </div>
    <div style="font-size:12px;color:${T.textSec};margin-top:8px">${label}</div>
    ${sublabel?`<div style="font-size:11px;color:${color};margin-top:2px">${sublabel}</div>`:''}
  </div>`;
}

function scoreRing(score){
  const size=140,r=size/2-12,circ=2*Math.PI*r,color=score>=7?T.green:score>=5?T.gold:T.warn;
  return `<div style="position:relative;width:${size}px;height:${size}px;margin:0 auto">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg);overflow:visible">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${T.border}" stroke-width="10"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-score/10)}" stroke-linecap="round" style="filter:drop-shadow(0 0 14px ${color}A0)"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:42px;font-weight:700;color:${color};letter-spacing:-0.04em;line-height:1">${score}</div>
      <div style="font-size:11px;color:${T.textSec};margin-top:3px">/ 10</div>
    </div>
  </div>`;
}

function renderSetup(){
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px">
    <div style="font-size:40px;margin-bottom:20px">✦</div>
    <div style="font-size:22px;font-weight:700;letter-spacing:-0.03em;margin-bottom:8px">Welcome to Tracker</div>
    <div style="font-size:14px;color:${T.textSec};line-height:1.7;text-align:center;margin-bottom:32px;max-width:320px">Paste your Gemini API key to power AI macro estimation, insights, and goal recommendations.</div>
    <input id="setup-key" type="text" placeholder="Paste API key here" style="width:100%;max-width:360px;background:${T.card};border:1px solid ${T.border};border-radius:14px;padding:14px 16px;font-size:14px;color:${T.text};outline:none;margin-bottom:12px"/>
    <div id="setup-err" style="font-size:13px;color:${T.warn};margin-bottom:12px;text-align:center;min-height:20px"></div>
    <button onclick="setupGo()" style="width:100%;max-width:360px;background:${T.green};color:#000;border:none;border-radius:14px;padding:14px 0;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 0 20px ${T.green}60" id="setup-btn">Get started →</button>
    <div style="font-size:12px;color:${T.textTer};margin-top:20px;text-align:center;line-height:1.7">Saved on this device only.<br>Get a free key at aistudio.google.com</div>
  </div>`;
}

async function setupGo(){
  const key=document.getElementById('setup-key').value.trim();
  const err=document.getElementById('setup-err');
  const btn=document.getElementById('setup-btn');
  if(!key){err.textContent='Paste your API key above';return;}
  btn.textContent='Checking…';btn.disabled=true;err.textContent='';
  try{
    localStorage.setItem('gemini_key',key);
    await callGemini('Reply with just the word OK');
    render();
  }catch(e){
    localStorage.removeItem('gemini_key');
    err.textContent="Key didn't work — check and try again";
    btn.textContent='Get started →';btn.disabled=false;
  }
}

function renderHeader(){
  return `<div style="padding:28px 18px 0;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
    <div>
      <div style="font-size:12px;color:${T.textTer};letter-spacing:0.1em;text-transform:uppercase;font-weight:500;margin-bottom:4px">${new Date().toLocaleDateString('en-US',{weekday:'long'})}</div>
      <div style="font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1.1">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}</div>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="openGoals()" style="font-size:12px;color:${T.textSec};background:${T.card};border:1px solid ${T.border};border-radius:10px;padding:8px 12px;cursor:pointer;font-weight:500">⚙ Goals</button>
      <button onclick="changeKey()" style="font-size:12px;color:${T.textTer};background:${T.card};border:1px solid ${T.border};border-radius:10px;padding:8px 10px;cursor:pointer">🔑</button>
    </div>
  </div>`;
}

function renderNav(){
  return `<div style="display:flex;margin:0 18px 20px;background:${T.card};border-radius:14px;padding:3px;border:1px solid ${T.border}">
    ${[['today','Today'],['week','Week'],['trends','Trends'],['insights','Insights']].map(([v,l])=>`<button onclick="setView('${v}')" style="flex:1;padding:9px 0;font-size:11px;font-weight:${A.view===v?600:400};background:${A.view===v?T.card2:'transparent'};border:${A.view===v?`1px solid ${T.border}`:'1px solid transparent'};border-radius:11px;cursor:pointer;color:${A.view===v?T.text:T.textSec}">${l}</button>`).join('')}
  </div>`;
}

function renderToday(){
  const td=today();
  const eaten=A.meals.reduce((s,m)=>s+(m.calories||0),0);
  const protein=A.meals.reduce((s,m)=>s+(m.protein||0),0);
  const carbs=A.meals.reduce((s,m)=>s+(m.carbs||0),0);
  const fat=A.meals.reduce((s,m)=>s+(m.fat||0),0);
  const calRem=A.goals.calories-eaten;
  const deficit=A.burn!=null?A.burn-eaten:null;
  const wg=Math.floor(A.water/8),wgg=Math.floor((A.goals.water||64)/8);
  const todayWt=A.weights.find(w=>w.date===td)?.weight;
  const prevWt=A.weights.filter(w=>w.date<td).slice(-1)[0]?.weight;
  const wtChg=todayWt&&prevWt?+(todayWt-prevWt).toFixed(1):null;
  const isSaved=m=>A.savedMeals.some(s=>s.name===(m.name||m.description));

  return `
  <div style="${CARD()};padding:24px 20px;margin:0 18px 10px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
      ${ring('calories eaten',`of ${A.goals.calories.toLocaleString()}`,eaten,A.goals.calories,T.green,'kcal')}
      ${ring('protein',`of ${A.goals.protein}g`,protein,A.goals.protein,T.blue,'grams')}
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <span style="font-size:12px;color:${calRem>=0?T.green:T.warn};background:${calRem>=0?T.green+'18':T.warn+'18'};padding:4px 14px;border-radius:20px;border:1px solid ${calRem>=0?T.green+'30':T.warn+'30'}">
        ${calRem>=0?`${calRem.toLocaleString()} cal remaining`:`${Math.abs(calRem).toLocaleString()} cal over goal`}
      </span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div onclick="openBurn()" style="flex:1;background:${T.card2};border-radius:12px;padding:12px 14px;text-align:center;cursor:pointer;border:1px solid ${T.border}">
        <div style="font-size:9px;color:${T.textTer};text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">burned</div>
        <div style="font-size:22px;font-weight:600;color:${T.green}">${A.burn!=null?A.burn.toLocaleString():'—'}</div>
        ${A.burn==null?`<div style="font-size:9px;color:${T.textTer};margin-top:2px">tap to add</div>`:''}
      </div>
      <div style="flex:1;background:${T.card2};border-radius:12px;padding:12px 14px;text-align:center;border:1px solid ${T.border}">
        <div style="font-size:9px;color:${T.textTer};text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">deficit</div>
        <div style="font-size:22px;font-weight:600;color:${deficit==null?T.textTer:deficit>=0?T.teal:T.warn}">${deficit!=null?(deficit>0?'+':'')+deficit.toLocaleString():'—'}</div>
      </div>
    </div>
    <div style="border-top:1px solid ${T.border};padding-top:12px">
      <div style="font-size:11px;color:${T.textSec};line-height:1.6">Oura sync requires a server — <span onclick="openBurn()" style="color:${T.blue};cursor:pointer">enter burn manually →</span></div>
    </div>
  </div>

  <div style="${CARD()};margin:0 18px 10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <div style="font-size:10px;color:${T.textTer};text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">hydration</div>
        <div style="font-size:20px;font-weight:600;color:${A.water>=(A.goals.water||64)?T.teal:T.text}">${wg}<span style="font-size:13px;font-weight:400;color:${T.textSec}"> / ${wgg} glasses</span></div>
      </div>
      <div style="font-size:13px;color:${T.teal};font-weight:500">${A.water}oz</div>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:12px">
      ${Array.from({length:wgg}).map((_,i)=>`<div style="flex:1;height:22px;border-radius:5px;background:${i<wg?T.teal:T.card2};border:1px solid ${i<wg?T.teal:T.border};box-shadow:${i<wg?`0 0 6px ${T.teal}50`:'none'}"></div>`).join('')}
    </div>
    <div style="display:flex;gap:7px">
      <button onclick="addWater(8)" style="flex:1;background:${T.card2};border:1px solid ${T.border};border-radius:8px;padding:8px 0;font-size:12px;color:${T.textSec};cursor:pointer">+8oz</button>
      <button onclick="addWater(16)" style="flex:1;background:${T.card2};border:1px solid ${T.border};border-radius:8px;padding:8px 0;font-size:12px;color:${T.textSec};cursor:pointer">+16oz</button>
      <button onclick="addWater(24)" style="flex:1;background:${T.card2};border:1px solid ${T.border};border-radius:8px;padding:8px 0;font-size:12px;color:${T.textSec};cursor:pointer">+24oz</button>
      ${A.water>0?`<button onclick="removeWater()" style="background:${T.card2};border:1px solid ${T.border};border-radius:8px;padding:8px 12px;font-size:13px;color:${T.warn};cursor:pointer">−</button>`:''}
    </div>
  </div>

  <div style="${CARD()};margin:0 18px 10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:${T.textTer};text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">body weight</div>
        ${todayWt?`<div style="display:flex;align-items:baseline;gap:8px">
          <div style="font-size:22px;font-weight:600">${todayWt}<span style="font-size:12px;font-weight:400;color:${T.textSec}"> lbs</span></div>
          ${wtChg!=null?`<div style="font-size:13px;color:${Math.abs(wtChg)<0.5?T.textSec:wtChg>0?T.gold:T.teal};font-weight:500">${wtChg>0?'+':''}${wtChg}</div>`:''}
        </div>`:`<div style="font-size:15px;color:${T.textTer}">Not logged today</div>`}
      </div>
      <button onclick="toggleWt()" style="font-size:12px;color:${T.blue};background:${T.blue}18;border:1px solid ${T.blue}30;border-radius:8px;padding:7px 14px;cursor:pointer">${todayWt?'Edit':'+ Log'}</button>
    </div>
    ${A.showWeightInput?`<div style="display:flex;gap:8px;margin-top:12px">
      <input id="wt-inp" type="number" value="${A.weightDraft}" oninput="A.weightDraft=this.value" placeholder="lbs" step="0.1" style="flex:1;background:${T.card2};border:1px solid ${T.border};border-radius:10px;padding:10px 12px;font-size:14px;color:${T.text};outline:none"/>
      <button onclick="logWeight()" style="background:${T.green};color:#000;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer">Save</button>
    </div>`:''}
  </div>

  <div style="display:flex;margin:0 18px 14px;background:${T.card};border-radius:12px;padding:3px;border:1px solid ${T.border}">
    <button onclick="setTab('meals')" style="flex:1;padding:9px 0;font-size:13px;font-weight:${A.tab==='meals'?600:400};background:${A.tab==='meals'?T.card2:'transparent'};border:${A.tab==='meals'?`1px solid ${T.border}`:'1px solid transparent'};border-radius:10px;cursor:pointer;color:${A.tab==='meals'?T.text:T.textSec}">Meals</button>
    <button onclick="setTab('workouts')" style="flex:1;padding:9px 0;font-size:13px;font-weight:${A.tab==='workouts'?600:400};background:${A.tab==='workouts'?T.card2:'transparent'};border:${A.tab==='workouts'?`1px solid ${T.border}`:'1px solid transparent'};border-radius:10px;cursor:pointer;color:${A.tab==='workouts'?T.text:T.textSec}">Workouts</button>
  </div>

  ${A.tab==='meals'?`<div style="padding:0 18px">
    ${A.savedMeals.length>0?`<div style="${CARD()};padding:14px 16px">
      <div style="font-size:10px;color:${T.textTer};letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px">quick add</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${A.savedMeals.map((m,i)=>`<button onclick="addSaved(${i})" style="font-size:12px;color:${T.blue};background:${T.blue}18;border:1px solid ${T.blue}40;border-radius:20px;padding:5px 10px 5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px">${esc(m.name)}<span onclick="event.stopPropagation();rmSaved(${i})" style="color:${T.textTer};font-size:15px;line-height:1">×</span></button>`).join('')}
      </div>
    </div>`:''}

    <input type="file" id="photo-inp" accept="image/*" onchange="handlePhoto(this)" style="display:none"/>
    <div style="${CARD()};padding:14px 16px">
      ${A.photo?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:${T.blue}18;border-radius:12px;border:1px solid ${T.blue}30">
        <img src="${A.photo.preview}" style="width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0"/>
        <span style="font-size:12px;color:${T.blue};flex:1;line-height:1.5">Photo ready — add context for accuracy</span>
        <button onclick="clearPhoto()" style="color:${T.textSec};background:none;border:none;font-size:18px;cursor:pointer;line-height:1">×</button>
      </div>`:''}
      <textarea id="meal-txt" oninput="A.mealText=this.value" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();logMeal();}" placeholder="${A.photo?'Optional: add context…':'Describe what you ate — AI estimates macros'}" rows="2" style="width:100%;border:none;outline:none;resize:none;font-size:14px;color:${T.text};background:transparent;font-family:inherit;line-height:1.6;box-sizing:border-box">${esc(A.mealText)}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid ${T.border}">
        <button onclick="document.getElementById('photo-inp').click()" style="font-size:12px;color:${T.textSec};background:${T.card2};border:1px solid ${T.border};border-radius:8px;padding:7px 12px;cursor:pointer">📷 Photo</button>
        <button onclick="logMeal()" ${A.aiLoading||(!A.mealText.trim()&&!A.photo)?'disabled':''} style="background:${A.aiLoading||(!A.mealText.trim()&&!A.photo)?T.card2:T.green};color:${A.aiLoading||(!A.mealText.trim()&&!A.photo)?T.textTer:'#000'};border:none;border-radius:10px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer">${A.aiLoading?'Estimating…':'Log →'}</button>
      </div>
    </div>

    ${A.meals.length>0?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px">

function renderWeek(){
  if(A.weekLoading)return`<div style="text-align:center;color:${T.textTer};padding:40px 0">Loading…</div>`;
  const days=weekDays(),td=today();
  const defs=days.map(d=>A.weekData[d]?.deficit).filter(d=>d!=null);
  const wTot=defs.reduce((s,d)=>s+d,0);
  return`<div style="padding:0 18px">
    <div style="${CARD()};display:grid;grid-template-columns:1fr 1fr 1fr">
      ${[['Weekly deficit',wTot!==0?(wTot>0?'+':'')+wTot.toLocaleString():'0','kcal',wTot>=0?T.teal:T.warn],['Avg deficit',defs.length>0?Math.round(wTot/defs.length).toLocaleString():'—','kcal/day',T.textSec],['Days tracked',`${defs.length}/7`,'',T.blue]].map(([l,v,u,c],i)=>`
        <div style="text-align:center;${i<2?`border-right:1px solid ${T.border}`:''};padding:4px 0">
          <div style="font-size:9px;color:${T.textTer};text-transform:uppercase;letter-spacing:0.09em;margin-bottom:6px">${l}</div>
          <div style="font-size:20px;font-weight:700;color:${c}">${v}</div>
          ${u?`<div style="font-size:9px;color:${T.textTer};margin-top:3px">${u}</div>`:''}
        </div>`).join('')}
    </div>
    ${days.map(day=>{
      const d=A.weekData[day]||{},isToday=day===td;
      const dc=d.deficit==null?T.textTer:d.deficit>=0?T.teal:T.warn;
      const pc=d.protein>0?(d.protein>=A.goals.protein?T.blue:T.textSec):T.textTer;
      return`<div style="background:${isToday?T.blue+'0A':T.card};border-radius:18px;padding:14px 16px;border:1px solid ${isToday?T.blue+'60':T.border};margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px">${dayS(day)}${isToday?`<span style="font-size:9px;color:${T.blue};font-weight:600;background:${T.blue}25;padding:2px 7px;border-radius:5px">TODAY</span>`:''}</div>
            <div style="font-size:11px;color:${T.textTer};margin-top:2px">${dayN(day)}</div>
          </div>
          <div style="display:flex;gap:12px">
            ${[['eaten',d.eaten>0?d.eaten.toLocaleString():'—',T.textSec],['protein',d.protein>0?d.protein+'g':'—',pc],['burned',d.burn!=null?d.burn.toLocaleString():'—',T.green],['deficit',d.deficit!=null?(d.deficit>0?'+':'')+d.deficit.toLocaleString():'—',dc]].map(([l,v,c])=>`
              <div style="text-align:right"><div style="font-size:9px;color:${T.textTer};margin-bottom:3px;text-transform:uppercase">${l}</div><div style="font-size:13px;font-weight:600;color:${c}">${v}</div></div>`).join('')}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${d.deficit!=null?`<div style="height:3px;background:${T.card2};border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(100,Math.abs(d.deficit)/10)}%;background:${d.deficit>=0?T.teal:T.warn};border-radius:3px"></div></div>`:''}
          ${d.protein>0?`<div style="height:3px;background:${T.card2};border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(100,(d.protein/A.goals.protein)*100)}%;background:${T.blue};border-radius:3px"></div></div>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

  return`<div style="padding:0 18px">

    ${fd.length>0?`<div style="${CARD()};display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${[['Avg deficit',fd.length?Math.round(fd.reduce((s,d)=>s+d.deficit,0)/fd.length)+' kcal':'—',T.teal],['Avg protein',fp.length?Math.round(fp.reduce((s,d)=>s+d.protein,0)/fp.length)+'g':'—',T.blue],['Days logged',fd.length+' / 30',T.textSec],['Protein goal hit',A.trends.filter(d=>d.protein!=null&&d.protein>=A.goals.protein).length+' days',T.blue]].map(([l,v,c])=>`

    </div>`:''}
  </div>`;

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          <div style="text-align:center;background:${T.card2};border-radius:10px;padding:12px 8px"><div style="font-size:9px;color:${T.textTer};text-transform:uppercase;margin-bottom:4px">calories</div><div style="font-size:26px;font-weight:700;color:${T.green}">${A.goalRec.calories?.toLocaleString()}</div><div style="font-size:9px;color:${T.textTer};margin-top:2px">kcal / day</div></div>
          <div style="text-align:center;background:${T.card2};border-radius:10px;padding:12px 8px"><div style="font-size:9px;color:${T.textTer};text-transform:uppercase;margin-bottom:4px">protein</div><div style="font-size:26px;font-weight:700;color:${T.blue}">${A.goalRec.protein}</div><div style="font-size:9px;color:${T.textTer};margin-top:2px">g / day</div></div>
        </div>
        <div style="font-size:13px;color:${T.textSec};line-height:1.7;margin-bottom:16px">${esc(A.goalRec.rationale)}</div>
        <div style="display:flex;gap:8px">
          <button onclick="applyRec()" style="flex:1;background:${T.blue};color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:13px;font-weight:600;cursor:pointer">Apply →</button>
          <button onclick="genRec()" style="background:none;border:1px solid ${T.border};border-radius:10px;padding:12px 14px;font-size:13px;color:${T.textSec};cursor:pointer">↻</button>
        </div>
      </div>`:''}
    </div>
  </div>`;
}

function renderBurnModal(){
  return`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;z-index:100" onclick="closeModal()">
    <div style="background:${T.card};border-radius:22px 22px 0 0;padding:24px 20px 52px;width:100%;max-width:480px;margin:0 auto;box-sizing:border-box;border:1px solid ${T.border}" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="font-size:17px;font-weight:600">Enter calories burned</div>
        <button onclick="closeModal()" style="color:${T.textSec};background:${T.card2};border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer">×</button>
      </div>
      <label style="font-size:12px;color:${T.textSec};display:block;margin-bottom:6px">Total calories burned today (from Oura app or estimate)</label>
      <input id="burn-inp" type="number" value="${A.burnDraft}" oninput="A.burnDraft=this.value" placeholder="e.g. 2100" style="width:100%;background:${T.card2};border:1px solid ${T.border};border-radius:12px;padding:12px 14px;font-size:14px;color:${T.text};outline:none;box-sizing:border-box;margin-bottom:20px"/>
      <button onclick="saveBurn()" style="width:100%;background:${T.green};color:#000;border:none;border-radius:12px;padding:14px 0;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 0 20px ${T.green}60">Save</button>
    </div>
  </div>`;
}

const charts={};
function render(){
  const root=document.getElementById('root');
  if(!localStorage.getItem('gemini_key')){
    root.innerHTML=`<div class="app" style="background:${T.bg};min-height:100vh">${renderSetup()}</div>`;
    return;
  }
  let view='';
  if(A.view==='today')view=renderToday();
  else if(A.view==='week')view=renderWeek();
  else if(A.view==='trends')view=renderTrends();
  else if(A.view==='insights')view=renderInsights();
  let modal='';
  if(A.modal==='goals')modal=renderGoalsModal();
  else if(A.modal==='burn')modal=renderBurnModal();
  root.innerHTML=`<div class="app" style="font-family:-apple-system,system-ui,sans-serif;background:${T.bg};min-height:100vh;color:${T.text}">${renderHeader()}${renderNav()}${view}${modal}</div>`;
  if(A.view==='trends')setTimeout(initCharts,50);
}

function initCharts(){
  const cfg=(data,key,color,unit)=>({type:'line',data:{labels:data.map(d=>d.date),datasets:[{data:data.map(d=>d[key]),borderColor:color,borderWidth:2,pointRadius:0,fill:false,tension:0.3,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y??'—'}${unit}`}}},scales:{x:{ticks:{color:T.textTer,font:{size:9},maxTicksLimit:6},grid:{display:false},border:{display:false}},y:{ticks:{color:T.textTer,font:{size:9}},grid:{color:'#24243250'},border:{display:false}}}}});
  [['ch-def',A.trends,'deficit',T.teal,' kcal'],['ch-pro',A.trends,'protein',T.blue,'g'],['ch-wt',A.trends.filter(d=>d.weight!=null),'weight',T.gold,' lbs']].forEach(([id,data,key,color,unit])=>{
    const el=document.getElementById(id);if(!el)return;
    if(charts[id])charts[id].destroy();
    charts[id]=new Chart(el,cfg(data,key,color,unit));
  });
}

function setView(v){
  A.view=v;
  if(v==='week'){A.weekLoading=true;render();setTimeout(()=>{const days=weekDays(),data={};days.forEach(day=>{data[day]={eaten:0,protein:0,burn:null,deficit:null};const m=ls.get(`meals:${day}`);if(m){data[day].eaten=m.reduce((s,x)=>s+(x.calories||0),0);data[day].protein=m.reduce((s,x)=>s+(x.protein||0),0);}const b=ls.raw(`burn:${day}`);if(b)data[day].burn=Number(b);if(data[day].burn!=null)data[day].deficit=data[day].burn-data[day].eaten;});A.weekData=data;A.weekLoading=false;render();},10);}
  else if(v==='trends'){A.trendLoading=true;render();setTimeout(()=>{A.trends=last30().map(day=>{const e={date:dayN(day),deficit:null,protein:null,weight:null};const m=ls.get(`meals:${day}`);if(m){e.protein=m.reduce((s,x)=>s+(x.protein||0),0);const eaten=m.reduce((s,x)=>s+(x.calories||0),0);const b=ls.raw(`burn:${day}`);if(b)e.deficit=Number(b)-eaten;}const w=ls.raw(`weight:${day}`);if(w)e.weight=Number(w);return e;});A.trendLoading=false;render();},10);}
  else render();
}
function setTab(t){A.tab=t;render();}
function openGoals(){A.modal='goals';A.goalDraft={...A.goals};render();}
function openBurn(){A.modal='burn';render();}
function closeModal(){A.modal=null;render();}
function changeKey(){localStorage.removeItem('gemini_key');render();}
function toggleWt(){A.showWeightInput=!A.showWeightInput;A.weightDraft=String(A.weights.find(w=>w.date===today())?.weight||'');render();}

function handlePhoto(inp){
  const f=inp.files?.[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{const d=ev.target.result;A.photo={base64:d.split(',')[1],mediaType:f.type,preview:d};render();};r.readAsDataURL(f);
}
function clearPhoto(){A.photo=null;render();}

async function logMeal(){
  if((!A.mealText.trim()&&!A.photo)||A.aiLoading)return;
  A.aiLoading=true;render();
  const desc=A.mealText.trim(),p=A.photo;
  A.mealText='';A.photo=null;
  try{
    const text=await callGemini(`Estimate nutrition${desc?`. Context: ${desc}`:''}.Return ONLY valid JSON: {"name":"short name","calories":0,"protein":0,"carbs":0,"fat":0} All integers. Realistic portions.`,p||null);
    const macros=JSON.parse(text.replace(/```json|```/g,'').trim());
    A.meals.push({id:Date.now(),time:fmtTime(),description:desc||'photo',photoPreview:p?.preview,...macros});
    ls.set(`meals:${today()}`,A.meals);
  }catch(e){A.meals.push({id:Date.now(),time:fmtTime(),description:desc||'photo',name:desc||'photo',calories:0,protein:0,carbs:0,fat:0,error:true,errorMsg:String(e?.message||e||'').slice(0,100)});ls.set(`meals:${today()}`,A.meals);}
  A.aiLoading=false;render();
}

function startEdit(i){const m=A.meals[i];A.editId=m.id;A.editDraft={name:m.name||m.description,calories:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat};render();}
function cancelEdit(){A.editId=null;render();}
function saveEdit(i){const m=A.meals[i];A.meals[i]={...m,...A.editDraft,calories:Number(A.editDraft.calories),protein:Number(A.editDraft.protein),carbs:Number(A.editDraft.carbs),fat:Number(A.editDraft.fat),error:false};A.editId=null;ls.set(`meals:${today()}`,A.meals);render();}
function delMeal(i){A.meals.splice(i,1);ls.set(`meals:${today()}`,A.meals);render();}
function saveFav(i){const m=A.meals[i],e={id:Date.now(),name:m.name||m.description,calories:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat};A.savedMeals=[e,...A.savedMeals.filter(x=>x.name!==e.name)].slice(0,12);ls.set('savedMeals',A.savedMeals);render();}
function addSaved(i){const s=A.savedMeals[i];A.meals.push({id:Date.now(),time:fmtTime(),...s});ls.set(`meals:${today()}`,A.meals);render();}
function rmSaved(i){A.savedMeals.splice(i,1);ls.set('savedMeals',A.savedMeals);render();}
function logWorkout(){if(!A.wf.type)return;A.workouts.push({id:Date.now(),time:fmtTime(),...A.wf});A.wf={type:'',duration:'',notes:''};ls.set(`workouts:${today()}`,A.workouts);render();}
function delWorkout(i){A.workouts.splice(i,1);ls.set(`workouts:${today()}`,A.workouts);render();}
function addWater(oz){A.water+=oz;ls.setRaw(`water:${today()}`,String(A.water));render();}
function removeWater(){A.water=Math.max(0,A.water-8);ls.setRaw(`water:${today()}`,String(A.water));render();}
function logWeight(){const val=Number(A.weightDraft||document.getElementById('wt-inp')?.value);if(!val)return;const td=today();A.weights=[...A.weights.filter(w=>w.date!==td),{date:td,weight:val}].sort((a,b)=>a.date.localeCompare(b.date));ls.setRaw(`weight:${td}`,String(val));A.showWeightInput=false;A.weightDraft='';render();}
function saveGoals(){A.goals={...A.goalDraft};ls.set('goals',A.goals);A.modal=null;render();}
function saveBurn(){const val=Number(A.burnDraft||document.getElementById('burn-inp')?.value);if(!val)return;A.burn=val;ls.setRaw(`burn:${today()}`,String(val));A.modal=null;A.burnDraft='';render();}

async function genInsights(){
  A.insightsLoading=true;render();
  try{
    const eaten=A.meals.reduce((s,m)=>s+(m.calories||0),0),protein=A.meals.reduce((s,m)=>s+(m.protein||0),0);
    const mS=A.meals.length>0?A.meals.map(m=>`${m.name||m.description}: ${m.calories}cal P${m.protein}g C${m.carbs}g F${m.fat}g`).join('; '):'none';
    const text=await callGemini(`Nutrition coach. Return ONLY valid JSON: {"score":7,"highlight":"one sentence","gaps":["g1","g2","g3"],"suggestions":["s1","s2","s3"],"macroNote":"one sentence"} Goals: protein ${A.goals.protein}g, calories ${A.goals.calories}. Meals: ${mS}. Totals: ${eaten}cal, ${protein}g protein. Burn: ${A.burn||'unknown'}. Water: ${A.water}oz.`);
    A.insights=JSON.parse(text.replace(/```json|```/g,'').trim());
    ls.set(`insights:${today()}`,A.insights);
  }catch(e){console.error(e);}
  A.insightsLoading=false;render();
}

async function genRec(){
  A.goalRecLoading=true;render();
  try{
    const days=weekDays(),rd=[];
    days.forEach(day=>{const e={eaten:0,protein:0,burn:null};const m=ls.get(`meals:${day}`);if(m){e.eaten=m.reduce((s,x)=>s+(x.calories||0),0);e.protein=m.reduce((s,x)=>s+(x.protein||0),0);}const b=ls.raw(`burn:${day}`);if(b)e.burn=Number(b);if(e.eaten>0||e.burn)rd.push(e);});
    const wb=rd.filter(d=>d.burn);
    const text=await callGemini(`Nutrition coach. Return ONLY valid JSON: {"calories":0,"protein":0,"rationale":"2-3 sentences"} Goal: ${A.fitGoal}${A.bodyWeight?`\nWeight: ${A.bodyWeight} lbs`:''}. Avg intake: ${rd.length?Math.round(rd.reduce((s,d)=>s+d.eaten,0)/rd.length):'unknown'} kcal. Avg burn: ${wb.length?Math.round(wb.reduce((s,d)=>s+d.burn,0)/wb.length):'unknown'} kcal. Avg protein: ${rd.length?Math.round(rd.reduce((s,d)=>s+d.protein,0)/rd.length):'unknown'}g.`);
    A.goalRec=JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e){console.error(e);}
  A.goalRecLoading=false;render();
}

function applyRec(){A.goalDraft={...A.goalDraft,calories:A.goalRec.calories,protein:A.goalRec.protein};A.goalRec=null;render();}

loadData();
render();
</script>
</body>
</html>
