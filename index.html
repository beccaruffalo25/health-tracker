<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0F;font-family:-apple-system,system-ui,sans-serif;color:#F2F2F7;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
#root{max-width:480px;margin:0 auto;padding-bottom:52px}
.card{background:#14141C;border-radius:18px;padding:16px 18px;border:1px solid #242432;margin-bottom:10px}
.row{display:flex;gap:8px}
.pill{font-size:11px;padding:3px 10px;border-radius:20px}
.macro-badge{font-size:11px;padding:2px 7px;border-radius:6px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8E8E9A;font-size:14px">Loading…</div></div>
<script type="module">
import{h,render}from'https://esm.sh/preact@10.19.3';
import{useState,useEffect,useRef}from'https://esm.sh/preact@10.19.3/hooks';
import htm from'https://esm.sh/htm@3.1.1';
import Chart from'https://esm.sh/chart.js@4.4.2/auto';
const html=htm.bind(h);

const T={bg:'#0A0A0F',card:'#14141C',card2:'#1C1C26',border:'#242432',
  green:'#30D158',blue:'#6B8EFF',gold:'#FFD60A',teal:'#00C9A7',
  warn:'#FF453A',text:'#F2F2F7',textSec:'#8E8E9A',textTer:'#48484E'};

const WE={'Lagree / Pilates':'🧘','Gym — weights':'🏋️','Cardio':'⚡','Walk':'🚶','Run':'🏃','Yoga':'🧘','Other':'✨'};

const today=()=>new Date().toISOString().split('T')[0];
const fmtTime=()=>new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const dayS=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
const dayN=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
const weekDays=()=>{const n=new Date(),day=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(day===0?6:day-1));return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d.toISOString().split('T')[0];});};
const last30=()=>Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return d.toISOString().split('T')[0];});

const S={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  raw:(k)=>{try{return localStorage.getItem(k)}catch{return null}},
  setRaw:(k,v)=>{try{localStorage.setItem(k,v)}catch{}}
};

async function gemini(prompt,img=null){
  const key=localStorage.getItem('gemini_key');
  const parts=img?[{inline_data:{mime_type:img.mediaType,data:img.base64}},{text:prompt}]:[{text:prompt}];
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:0.1}})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

function Ring({label,sublabel,current,max,color,unit,size=100}){
  const r=size/2-10,circ=2*Math.PI*r,pct=max>0?Math.min(1,current/max):0;
  return html`<div style=${{textAlign:'center'}}>
    <div style=${{position:'relative',width:size,height:size,margin:'0 auto'}}>
      <svg width=${size} height=${size} style=${{transform:'rotate(-90deg)',overflow:'visible'}}>
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${T.border} stroke-width="8"/>
        ${pct>0&&html`<circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width="8"
          stroke-dasharray=${circ} stroke-dashoffset=${circ*(1-pct)} stroke-linecap="round"
          style=${{filter:`drop-shadow(0 0 10px ${color}90)`,transition:'stroke-dashoffset 0.7s ease'}}/>`}
      </svg>
      <div style=${{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style=${{fontSize:18,fontWeight:600,color:T.text,letterSpacing:'-0.02em',lineHeight:1}}>${typeof current==='number'?current.toLocaleString():current}</div>
        ${unit&&html`<div style=${{fontSize:9,color:T.textSec,marginTop:2,textTransform:'uppercase',letterSpacing:'0.07em'}}>${unit}</div>`}
      </div>
    </div>
    <div style=${{fontSize:12,color:T.textSec,marginTop:8}}>${label}</div>
    ${sublabel&&html`<div style=${{fontSize:11,color,marginTop:2}}>${sublabel}</div>`}
  </div>`;
}

function ScoreRing({score}){
  const size=140,r=size/2-12,circ=2*Math.PI*r,color=score>=7?T.green:score>=5?T.gold:T.warn;
  return html`<div style=${{position:'relative',width:size,height:size,margin:'0 auto'}}>
    <svg width=${size} height=${size} style=${{transform:'rotate(-90deg)',overflow:'visible'}}>
      <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${T.border} stroke-width="10"/>
      <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width="10"
        stroke-dasharray=${circ} stroke-dashoffset=${circ*(1-score/10)} stroke-linecap="round"
        style=${{filter:`drop-shadow(0 0 14px ${color}A0)`,transition:'stroke-dashoffset 1s ease'}}/>
    </svg>
    <div style=${{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style=${{fontSize:42,fontWeight:700,color,letterSpacing:'-0.04em',lineHeight:1}}>${score}</div>
      <div style=${{fontSize:11,color:T.textSec,marginTop:3}}>/ 10</div>
    </div>
  </div>`;
}

function Sheet({title,onClose,children}){
  return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',zIndex:100}} onClick=${onClose}>
    <div style=${{background:T.card,borderRadius:'22px 22px 0 0',padding:'24px 20px 52px',width:'100%',maxWidth:480,margin:'0 auto',boxSizing:'border-box',maxHeight:'88vh',overflowY:'auto',border:`1px solid ${T.border}`}} onClick=${e=>e.stopPropagation()}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style=${{fontSize:17,fontWeight:600}}>${title}</div>
        <button onClick=${onClose} style=${{color:T.textSec,background:T.card2,border:'none',width:30,height:30,borderRadius:'50%',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      </div>
      ${children}
    </div>
  </div>`;
}

function TrendChart({data,dataKey,color,unit='',goal=null}){
  const ref=useRef(null);
  const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(chart.current){chart.current.destroy();chart.current=null;}
    chart.current=new Chart(ref.current,{
      type:'line',
      data:{labels:data.map(d=>d.date),datasets:[{data:data.map(d=>d[dataKey]),borderColor:color,borderWidth:2,pointRadius:0,fill:false,tension:0.3,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y??'—'}${unit}`}}},
        scales:{x:{ticks:{color:T.textTer,font:{size:9},maxTicksLimit:6},grid:{display:false},border:{display:false}},
          y:{ticks:{color:T.textTer,font:{size:9}},grid:{color:'#24243250'},border:{display:false}}}}
    });
    return()=>{if(chart.current){chart.current.destroy();chart.current=null;}};
  },[data,dataKey,color]);
  return html`<canvas ref=${ref} style=${{width:'100%',height:'130px'}}></canvas>`;
}

function SetupScreen({onDone}){
  const [key,setKey]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  async function go(){
    if(!key.trim()){setErr('Paste your API key above');return;}
    setBusy(true);setErr('');
    try{
      localStorage.setItem('gemini_key',key.trim());
      await gemini('Reply with just the word OK');
      onDone();
    }catch(e){setErr('Key didn\'t work — double check and try again');localStorage.removeItem('gemini_key');}
    setBusy(false);
  }
  return html`<div style=${{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px'}}>
    <div style=${{fontSize:40,marginBottom:20}}>✦</div>
    <div style=${{fontSize:22,fontWeight:700,letterSpacing:'-0.03em',marginBottom:8}}>Welcome to Tracker</div>
    <div style=${{fontSize:14,color:T.textSec,lineHeight:1.7,textAlign:'center',marginBottom:32,maxWidth:320}}>Paste your Gemini API key to power AI macro estimation, insights, and goal recommendations.</div>
    <input value=${key} onInput=${e=>setKey(e.target.value)} placeholder="Paste API key here"
      style=${{width:'100%',maxWidth:360,background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'14px 16px',fontSize:14,color:T.text,outline:'none',marginBottom:12}}/>
    ${err&&html`<div style=${{fontSize:13,color:T.warn,marginBottom:12,textAlign:'center'}}>${err}</div>`}
    <button onClick=${go} disabled=${busy}
      style=${{width:'100%',maxWidth:360,background:busy?T.card2:T.green,color:busy?T.textSec:'#000',border:'none',borderRadius:14,padding:'14px 0',fontSize:15,fontWeight:700,cursor:busy?'not-allowed':'pointer',boxShadow:busy?'none':`0 0 20px ${T.green}60`}}>
      ${busy?'Checking…':'Get started →'}
    </button>
    <div style=${{fontSize:12,color:T.textTer,marginTop:20,textAlign:'center',lineHeight:1.7}}>Saved on this device only.<br/>Get a free key at aistudio.google.com</div>
  </div>`;
}

function App(){
  const td=today();
  const [view,setView]=useState('today');
  const [tab,setTab]=useState('meals');
  const [meals,setMeals]=useState([]);
  const [workouts,setWorkouts]=useState([]);
  const [burn,setBurn]=useState(null);
  const [goals,setGoals]=useState({calories:1600,protein:100,water:64});
  const [mealText,setMealText]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [saved,setSaved]=useState([]);
  const [editId,setEditId]=useState(null);
  const [editD,setEditD]=useState({});
  const fileRef=useRef(null);
  const [wf,setWf]=useState({type:'',duration:'',notes:''});
  const [water,setWater]=useState(0);
  const [weights,setWeights]=useState([]);
  const [showW,setShowW]=useState(false);
  const [wDraft,setWDraft]=useState('');
  const [weekData,setWeekData]=useState({});
  const [weekLoading,setWeekLoading]=useState(false);
  const [trends,setTrends]=useState([]);
  const [trendLoading,setTrendLoading]=useState(false);
  const [insights,setInsights]=useState(null);
  const [insightsLoading,setInsightsLoading]=useState(false);
  const [modal,setModal]=useState(null);
  const [gDraft,setGDraft]=useState({calories:1600,protein:100,water:64});
  const [bDraft,setBDraft]=useState('');
  const [rec,setRec]=useState(null);
  const [recLoading,setRecLoading]=useState(false);
  const [fitGoal,setFitGoal]=useState('recomp');
  const [bw,setBw]=useState('');

  useEffect(()=>{
    const m=S.get(`meals:${td}`);if(m)setMeals(m);
    const w=S.get(`workouts:${td}`);if(w)setWorkouts(w);
    const g=S.get('goals');if(g){setGoals(g);setGDraft(g);}
    const sv=S.get('savedMeals');if(sv)setSaved(sv);
    const ins=S.get(`insights:${td}`);if(ins)setInsights(ins);
    const b=S.raw(`burn:${td}`);if(b)setBurn(Number(b));
    const wt=S.raw(`water:${td}`);if(wt)setWater(Number(wt));
    const entries=[];last30().forEach(day=>{const r=S.raw(`weight:${day}`);if(r)entries.push({date:day,weight:Number(r)});});
    setWeights(entries);
  },[td]);

  useEffect(()=>{S.set(`meals:${td}`,meals);},[meals]);
  useEffect(()=>{S.set(`workouts:${td}`,workouts);},[workouts]);

  useEffect(()=>{
    if(view!=='week')return;
    setWeekLoading(true);
    const days=weekDays(),data={};
    days.forEach(day=>{
      data[day]={eaten:0,protein:0,burn:null,deficit:null};
      const m=S.get(`meals:${day}`);if(m){data[day].eaten=m.reduce((s,x)=>s+(x.calories||0),0);data[day].protein=m.reduce((s,x)=>s+(x.protein||0),0);}
      const b=S.raw(`burn:${day}`);if(b)data[day].burn=Number(b);
      if(data[day].burn!=null)data[day].deficit=data[day].burn-data[day].eaten;
    });
    setWeekData(data);setWeekLoading(false);
  },[view]);

  useEffect(()=>{
    if(view!=='trends')return;
    setTrendLoading(true);
    const data=last30().map(day=>{
      const e={date:dayN(day),deficit:null,protein:null,weight:null};
      const m=S.get(`meals:${day}`);
      if(m){e.protein=m.reduce((s,x)=>s+(x.protein||0),0);const eaten=m.reduce((s,x)=>s+(x.calories||0),0);const b=S.raw(`burn:${day}`);if(b)e.deficit=Number(b)-eaten;}
      const w=S.raw(`weight:${day}`);if(w)e.weight=Number(w);
      return e;
    });
    setTrends(data);setTrendLoading(false);
  },[view]);

  function onPhoto(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const d=ev.target.result;setPhoto({base64:d.split(',')[1],mediaType:f.type,preview:d});};r.readAsDataURL(f);e.target.value='';}

  async function logMeal(){
    if((!mealText.trim()&&!photo)||aiLoading)return;
    setAiLoading(true);const desc=mealText.trim(),p=photo;setMealText('');setPhoto(null);
    try{
      const prompt=`Estimate nutrition for this meal${desc?`. Context: ${desc}`:''}.
Return ONLY valid JSON: {"name":"short name","calories":0,"protein":0,"carbs":0,"fat":0}
All values must be integers. Realistic serving sizes.`;
      const text=await gemini(prompt,p||null);
      const macros=JSON.parse(text.replace(/```json|```/g,'').trim());
      setMeals(prev=>[...prev,{id:Date.now(),time:fmtTime(),description:desc||'photo',photoPreview:p?.preview,...macros}]);
    }catch{setMeals(prev=>[...prev,{id:Date.now(),time:fmtTime(),description:desc||'photo',name:desc||'photo',calories:0,protein:0,carbs:0,fat:0,error:true}]);}
    setAiLoading(false);
  }

  const startEdit=m=>{setEditId(m.id);setEditD({name:m.name||m.description,calories:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat});};
  const saveEdit=id=>{setMeals(p=>p.map(m=>m.id===id?{...m,...editD,calories:Number(editD.calories),protein:Number(editD.protein),carbs:Number(editD.carbs),fat:Number(editD.fat),error:false}:m));setEditId(null);};
  const saveFav=m=>{const e={id:Date.now(),name:m.name||m.description,calories:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat};const u=[e,...saved.filter(x=>x.name!==e.name)].slice(0,12);setSaved(u);S.set('savedMeals',u);};
  const addSaved=s=>setMeals(p=>[...p,{id:Date.now(),time:fmtTime(),description:s.name,name:s.name,calories:s.calories,protein:s.protein,carbs:s.carbs,fat:s.fat}]);
  const rmSaved=id=>{const u=saved.filter(m=>m.id!==id);setSaved(u);S.set('savedMeals',u);};
  const logWorkout=()=>{if(!wf.type)return;setWorkouts(p=>[...p,{id:Date.now(),time:fmtTime(),...wf}]);setWf({type:'',duration:'',notes:''});};
  const addWater=oz=>{const v=water+oz;setWater(v);S.setRaw(`water:${td}`,String(v));};
  const rmWater=()=>{const v=Math.max(0,water-8);setWater(v);S.setRaw(`water:${td}`,String(v));};
  const logWeight=()=>{const val=Number(wDraft);if(!val)return;const u=[...weights.filter(e=>e.date!==td),{date:td,weight:val}].sort((a,b)=>a.date.localeCompare(b.date));setWeights(u);S.setRaw(`weight:${td}`,String(val));setShowW(false);setWDraft('');};

  async function genInsights(){
    setInsightsLoading(true);
    try{
      const mS=meals.length>0?meals.map(m=>`${m.name||m.description}: ${m.calories}cal P${m.protein}g C${m.carbs}g F${m.fat}g`).join('; '):'none';
      const text=await gemini(`Nutrition coach. Return ONLY valid JSON:
{"score":7,"highlight":"one sentence","gaps":["g1","g2","g3"],"suggestions":["s1","s2","s3"],"macroNote":"one sentence"}
Goals: protein ${goals.protein}g, calories ${goals.calories}.
Meals: ${mS}. Totals: ${eaten}cal, ${protein}g protein. Burn: ${burn||'unknown'}. Water: ${water}oz.`);
      const p=JSON.parse(text.replace(/```json|```/g,'').trim());
      setInsights(p);S.set(`insights:${td}`,p);
    }catch(e){console.error(e);}
    setInsightsLoading(false);
  }

  async function genRec(){
    setRecLoading(true);
    try{
      const days=weekDays(),rd=[];
      days.forEach(day=>{
        const e={eaten:0,protein:0,burn:null,wc:0};
        const m=S.get(`meals:${day}`);if(m){e.eaten=m.reduce((s,x)=>s+(x.calories||0),0);e.protein=m.reduce((s,x)=>s+(x.protein||0),0);}
        const b=S.raw(`burn:${day}`);if(b)e.burn=Number(b);
        const w=S.get(`workouts:${day}`);if(w)e.wc=w.length;
        if(e.eaten>0||e.burn)rd.push(e);
      });
      const wb=rd.filter(d=>d.burn);
      const text=await gemini(`Nutrition coach. Return ONLY valid JSON:
{"calories":0,"protein":0,"rationale":"2-3 sentences referencing their actual data"}
Goal: ${fitGoal}${bw?`\nWeight: ${bw} lbs`:''}
Avg intake: ${rd.length?Math.round(rd.reduce((s,d)=>s+d.eaten,0)/rd.length):'unknown'} kcal
Avg burn: ${wb.length?Math.round(wb.reduce((s,d)=>s+d.burn,0)/wb.length):'unknown'} kcal
Avg protein: ${rd.length?Math.round(rd.reduce((s,d)=>s+d.protein,0)/rd.length):'unknown'}g
Days of data: ${rd.length}`);
      setRec(JSON.parse(text.replace(/```json|```/g,'').trim()));
    }catch(e){console.error(e);}
    setRecLoading(false);
  }

  const saveGoals=()=>{setGoals(gDraft);S.set('goals',gDraft);setModal(null);};
  const saveBurn=()=>{const v=Number(bDraft);if(!v)return;setBurn(v);S.setRaw(`burn:${td}`,String(v));setModal(null);setBDraft('');};

  const eaten=meals.reduce((s,m)=>s+(m.calories||0),0);
  const protein=meals.reduce((s,m)=>s+(m.protein||0),0);
  const carbs=meals.reduce((s,m)=>s+(m.carbs||0),0);
  const fat=meals.reduce((s,m)=>s+(m.fat||0),0);
  const calRem=goals.calories-eaten;
  const wg=Math.floor(water/8),wgg=Math.floor((goals.water||64)/8);
  const days=weekDays(),wDefs=days.map(d=>weekData[d]?.deficit).filter(d=>d!=null),wTot=wDefs.reduce((s,d)=>s+d,0);
  const todayWt=weights.find(w=>w.date===td)?.weight;
  const prevWt=weights.filter(w=>w.date<td).slice(-1)[0]?.weight;
  const wtChg=todayWt&&prevWt?+(todayWt-prevWt).toFixed(1):null;
  const isSaved=m=>saved.some(s=>s.name===(m.name||m.description));
  const logDis=(!mealText.trim()&&!photo)||aiLoading;

  const C=`background:${T.card};border-radius:18px;padding:16px 18px;border:1px solid ${T.border};margin-bottom:10px`;
  const IS=`width:100%;background:${T.card2};border:1px solid ${T.border};border-radius:12px;padding:12px 14px;font-size:14px;color:${T.text};outline:none;box-sizing:border-box;margin-bottom:14px`;

  return html`<div style=${{fontFamily:'-apple-system,system-ui,sans-serif',background:T.bg,minHeight:'100vh',color:T.text}}>
    <!-- Header -->
    <div style=${{padding:'28px 18px 0',display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
      <div>
        <div style=${{fontSize:12,color:T.textTer,letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:500,marginBottom:4}}>${new Date().toLocaleDateString('en-US',{weekday:'long'})}</div>
        <div style=${{fontSize:26,fontWeight:700,letterSpacing:'-0.03em',lineHeight:1.1}}>${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}</div>
      </div>
      <div style=${{display:'flex',gap:8}}>
        <button onClick=${()=>{setGDraft({...goals});setModal('goals');}} style=${{fontSize:12,color:T.textSec,background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:'8px 12px',cursor:'pointer',fontWeight:500}}>⚙ Goals</button>
        <button onClick=${()=>{localStorage.removeItem('gemini_key');location.reload();}} style=${{fontSize:12,color:T.textTer,background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:'8px 10px',cursor:'pointer'}} title="Change key">🔑</button>
      </div>
    </div>

    <!-- Nav -->
    <div style=${{display:'flex',margin:'0 18px 20px',background:T.card,borderRadius:14,padding:3,border:`1px solid ${T.border}`}}>
      ${[['today','Today'],['week','Week'],['trends','Trends'],['insights','Insights']].map(([v,l])=>html`
        <button onClick=${()=>setView(v)} style=${{flex:1,padding:'9px 0',fontSize:11,fontWeight:view===v?600:400,background:view===v?T.card2:'transparent',border:view===v?`1px solid ${T.border}`:'1px solid transparent',borderRadius:11,cursor:'pointer',color:view===v?T.text:T.textSec,transition:'all 0.2s'}}>${l}</button>
      `)}
    </div>

    ${view==='today'&&html`<div>
      <!-- Stats card -->

          ${(()=>{
            const fd=trends.filter(d=>d.deficit!=null),fp=trends.filter(d=>d.protein!=null);
            return [
              ['Avg deficit',fd.length?Math.round(fd.reduce((s,d)=>s+d.deficit,0)/fd.length)+' kcal':'—',T.teal],
              ['Avg protein',fp.length?Math.round(fp.reduce((s,d)=>s+d.protein,0)/fp.length)+'g':'—',T.blue],
              ['Days logged',fd.length+' / 30',T.textSec],
              ['Protein goal hit',trends.filter(d=>d.protein!=null&&d.protein>=goals.protein).length+' days',T.blue],
            ].map(([l,v,c])=>html`<div style=${{background:T.card2,borderRadius:12,padding:'14px 16px',border:`1px solid ${T.border}`}}>
              <div style=${{fontSize:10,color:T.textTer,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>${l}</div>
              <div style=${{fontSize:20,fontWeight:700,color:c,letterSpacing:'-0.02em'}}>${v}</div>
            </div>`);
          })()}
        </div>`}
      </div>`}
    </div>`}

    ${view==='insights'&&html`<div style=${{padding:'0 18px'}}>
      <div style=${{background:T.card,borderRadius:18,padding:'16px 18px',border:`1px solid ${T.border}`,marginBottom:10}}>
        <div style=${{fontSize:13,color:T.textSec,lineHeight:1.7,marginBottom:10}}>AI analyzes your meals and identifies nutritional gaps.</div>
        <div style=${{display:'flex',gap:7,flexWrap:'wrap'}}>
          <span style=${{fontSize:11,background:`${T.green}20`,color:T.green,padding:'3px 10px',borderRadius:20,border:`1px solid ${T.green}30`}}>${meals.length} meals</span>
          <span style=${{fontSize:11,background:`${T.blue}20`,color:T.blue,padding:'3px 10px',borderRadius:20,border:`1px solid ${T.blue}30`}}>${eaten.toLocaleString()} kcal</span>
          <span style=${{fontSize:11,background:`${T.blue}20`,color:T.blue,padding:'3px 10px',borderRadius:20,border:`1px solid ${T.blue}30`}}>${protein}g protein</span>
          ${water>0&&html`<span style=${{fontSize:11,background:`${T.teal}20`,color:T.teal,padding:'3px 10px',borderRadius:20,border:`1px solid ${T.teal}30`}}>${water}oz water</span>`}
        </div>
      </div>
      ${!insights&&!insightsLoading&&html`<div style=${{textAlign:'center',padding:'44px 20px'}}>
        <div style=${{fontSize:42,marginBottom:16,opacity:0.3}}>✦</div>
        <div style=${{fontSize:18,fontWeight:600,marginBottom:8}}>Nutrition insights</div>
        <div style=${{fontSize:13,color:T.textSec,marginBottom:28,lineHeight:1.7}}>Identify gaps, missing micronutrients, and get specific food suggestions.</div>
        <button onClick=${genInsights} style=${{background:T.blue,color:'#fff',border:'none',borderRadius:14,padding:'14px 32px',fontSize:14,fontWeight:600,cursor:'pointer',boxShadow:`0 0 20px ${T.blue}60`}}>Generate insights</button>
      </div>`}
      ${insightsLoading&&html`<div style=${{textAlign:'center',padding:'44px 0',color:T.textSec,fontSize:14}}><div style=${{fontSize:32,marginBottom:14,opacity:0.3}}>✦</div>Analyzing…</div>`}
      ${insights&&!insightsLoading&&html`<div>
        <div style=${{background:T.card,borderRadius:18,padding:'28px 20px',border:`1px solid ${T.border}`,textAlign:'center',marginBottom:10}}>
          <${ScoreRing} score=${insights.score}/>
          <div style=${{fontSize:11,color:T.textTer,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:16,marginBottom:8}}>nutrition score</div>
          <div style=${{fontSize:15,color:T.textSec,lineHeight:1.6,maxWidth:280,margin:'0 auto'}}>${insights.highlight}</div>
        </div>
        <div style=${{background:T.card,borderRadius:18,padding:'16px 18px',border:`1px solid ${T.border}`,marginBottom:10}}>
          <div style=${{fontSize:10,color:T.textTer,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:12}}>macro balance</div>
          <div style=${{fontSize:14,lineHeight:1.7}}>${insights.macroNote}</div>
        </div>
        ${insights.gaps?.length>0&&html`<div style=${{background:T.card,borderRadius:18,padding:'16px 18px',border:`1px solid ${T.border}`,marginBottom:10}}>
          <div style=${{fontSize:10,color:T.textTer,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>potential gaps</div>
          ${insights.gaps.map((g,i)=>html`<div style=${{display:'flex',alignItems:'flex-start',gap:12,marginBottom:i<insights.gaps.length-1?12:0}}>
            <div style=${{width:6,height:6,borderRadius:'50%',background:T.warn,flexShrink:0,marginTop:7,boxShadow:`0 0 6px ${T.warn}`}}/>
            <div style=${{fontSize:14,lineHeight:1.6}}>${g}</div>
          </div>`)}
        </div>`}
        ${insights.suggestions?.length>0&&html`<div style=${{background:T.card,borderRadius:18,padding:'16px 18px',border:`1px solid ${T.border}`,marginBottom:10}}>
          <div style=${{fontSize:10,color:T.textTer,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>eat more of</div>
          ${insights.suggestions.map((s,i)=>html`<div style=${{display:'flex',alignItems:'flex-start',gap:12,marginBottom:i<insights.suggestions.length-1?12:0}}>
            <div style=${{width:6,height:6,borderRadius:'50%',background:T.green,flexShrink:0,marginTop:7,boxShadow:`0 0 6px ${T.green}`}}/>
            <div style=${{fontSize:14,lineHeight:1.6}}>${s}</div>
          </div>`)}
        </div>`}
        <button onClick=${genInsights} style=${{width:'100%',background:'none',border:`1px solid ${T.border}`,borderRadius:12,padding:'13px 0',fontSize:13,color:T.textSec,cursor:'pointer'}}>↻ Refresh</button>
      </div>`}
    </div>`}

    <!-- Goals modal -->
    ${modal==='goals'&&html`<${Sheet} title="Daily goals" onClose=${()=>{setModal(null);setRec(null);}}>
      <label style=${{fontSize:12,color:T.textSec,display:'block',marginBottom:6}}>Calorie goal</label>
      <input type="number" value=${gDraft.calories} onInput=${e=>setGDraft(p=>({...p,calories:Number(e.target.value)}))} style=${IS}/>
      <label style=${{fontSize:12,color:T.textSec,display:'block',marginBottom:6}}>Protein goal (g)</label>
      <input type="number" value=${gDraft.protein} onInput=${e=>setGDraft(p=>({...p,protein:Number(e.target.value)}))} style=${IS}/>
      <label style=${{fontSize:12,color:T.textSec,display:'block',marginBottom:6}}>Daily water goal (oz)</label>
      <input type="number" value=${gDraft.water||64} onInput=${e=>setGDraft(p=>({...p,water:Number(e.target.value)}))} style=${{...IS,marginBottom:16}}/>
      <button onClick=${saveGoals} style=${{width:'100%',background:T.green,color:'#000',border:'none',borderRadius:12,padding:'14px 0',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:`0 0 20px ${T.green}60`,marginBottom:24}}>Save</button>
      <div style=${{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <div style=${{flex:1,height:1,background:T.border}}/>
        <div style=${{fontSize:10,color:T.textTer,letterSpacing:'0.1em',whiteSpace:'nowrap'}}>AI RECOMMENDATION</div>
        <div style=${{flex:1,height:1,background:T.border}}/>
      </div>
      <label style=${{fontSize:12,color:T.textSec,display:'block',marginBottom:6}}>What's your goal?</label>
      <select value=${fitGoal} onChange=${e=>{setFitGoal(e.target.value);setRec(null);}} style=${{...IS,cursor:'pointer',marginBottom:12}}>
        <option value="recomp">Body recomposition</option>
        <option value="cut">Cut (lose fat)</option>
        <option value="bulk">Lean bulk</option>
        <option value="maintain">Maintain weight</option>
      </select>
      <label style=${{fontSize:12,color:T.textSec,display:'block',marginBottom:6}}>Body weight <span style=${{color:T.textTer}}>(optional)</span></label>
      <input type="number" value=${bw} onInput=${e=>{setBw(e.target.value);setRec(null);}} placeholder="lbs" style=${{...IS,marginBottom:16}}/>
      ${!rec&&!recLoading&&html`<button onClick=${genRec} style=${{width:'100%',background:T.blue,color:'#fff',border:'none',borderRadius:12,padding:'14px 0',fontSize:14,fontWeight:600,cursor:'pointer',boxShadow:`0 0 20px ${T.blue}50`}}>✦ Recommend with AI</button>`}
      ${recLoading&&html`<div style=${{textAlign:'center',padding:'18px 0',color:T.textSec,fontSize:13}}>Analyzing your data…</div>`}
      ${rec&&!recLoading&&html`<div style=${{background:`${T.blue}12`,border:`1px solid ${T.blue}35`,borderRadius:14,padding:'18px 16px'}}>
        <div style=${{fontSize:10,color:T.blue,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>recommendation</div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div style=${{textAlign:'center',background:T.card2,borderRadius:10,padding:'12px 8px'}}>
            <div style=${{fontSize:9,color:T.textTer,textTransform:'uppercase',marginBottom:4}}>calories</div>
            <div style=${{fontSize:26,fontWeight:700,color:T.green}}>${rec.calories?.toLocaleString()}</div>
            <div style=${{fontSize:9,color:T.textTer,marginTop:2}}>kcal / day</div>
          </div>
          <div style=${{textAlign:'center',background:T.card2,borderRadius:10,padding:'12px 8px'}}>
            <div style=${{fontSize:9,color:T.textTer,textTransform:'uppercase',marginBottom:4}}>protein</div>
            <div style=${{fontSize:26,fontWeight:700,color:T.blue}}>${rec.protein}</div>
            <div style=${{fontSize:9,color:T.textTer,marginTop:2}}>g / day</div>
          </div>
        </div>
        <div style=${{fontSize:13,color:T.textSec,lineHeight:1.7,marginBottom:16}}>${rec.rationale}</div>
        <div style=${{display:'flex',gap:8}}>
          <button onClick=${()=>{setGDraft(p=>({...p,calories:rec.calories,protein:rec.protein}));setRec(null);}} style=${{flex:1,background:T.blue,color:'#fff',border:'none',borderRadius:10,padding:'12px 0',fontSize:13,fontWeight:600,cursor:'pointer'}}>Apply →</button>
          <button onClick=${genRec} style=${{background:'none',border:`1px solid ${T.border}`,borderRadius:10,padding:'12px 14px',fontSize:13,color:T.textSec,cursor:'pointer'}}>↻</button>
        </div>
      </div>`}
    </${Sheet}>`}

    <!-- Burn modal -->
    ${modal==='burn'&&html`<${Sheet} title="Enter calories burned" onClose=${()=>setModal(null)}>
      <label style=${{fontSize:12,color:T.textSec,display:'block',marginBottom:6}}>Total calories burned today (from Oura app or estimate)</label>
      <input type="number" value=${bDraft} onInput=${e=>setBDraft(e.target.value)} placeholder="e.g. 2100" style=${{...IS,marginBottom:20}}/>
      <button onClick=${saveBurn} disabled=${!bDraft} style=${{width:'100%',background:bDraft?T.green:T.card2,color:bDraft?'#000':T.textTer,border:'none',borderRadius:12,padding:'14px 0',fontSize:14,fontWeight:700,cursor:bDraft?'pointer':'not-allowed',boxShadow:bDraft?`0 0 20px ${T.green}60`:'none'}}>Save</button>
    </${Sheet}>`}
  </div>`;
}

function Root(){
  const [hasKey,setHasKey]=useState(!!localStorage.getItem('gemini_key'));
  if(!hasKey)return html`<${SetupScreen} onDone=${()=>setHasKey(true)}/>`;
  return html`<${App}/>`;
}

render(html`<${Root}/>`,document.getElementById('root'));
</script>
</body>
</html>
