<!DOCTYPE html>
<html lang="en">
<head>

  input, select, textarea, button { font-family: inherit; }

  ::-webkit-scrollbar { display: none; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  bg:"#0A0A0F", card:"#14141C", card2:"#1C1C26", border:"#242432",
  green:"#30D158", blue:"#6B8EFF", gold:"#FFD60A", teal:"#00C9A7",
  warn:"#FF453A", text:"#F2F2F7", textSec:"#8E8E9A", textTer:"#48484E",
};

const WORKOUT_EMOJI = {"Lagree / Pilates":"🧘","Gym — weights":"🏋️","Cardio":"⚡","Walk":"🚶","Run":"🏃","Yoga":"🧘","Other":"✨"};

function getToday() { return new Date().toISOString().split("T")[0]; }
function fmtTime() { return new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }
function dayShort(d) { return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"}); }
function dayNum(d) { return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function getWeekDays() {
  const n=new Date(),day=n.getDay(),mon=new Date(n);
  mon.setDate(n.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
}
function getLast30() {
  return Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return d.toISOString().split("T")[0];});
}

// localStorage helpers
const store = {
  get: (k) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch(_){return null;} },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(_){} },
  raw: (k) => { try { return localStorage.getItem(k); } catch(_){return null;} },
  setRaw: (k,v) => { try { localStorage.setItem(k,v); } catch(_){} },
};

// Gemini API
async function gemini(prompt, imageData=null) {
  const key = localStorage.getItem("gemini_key");
  const parts = imageData
    ? [{inline_data:{mime_type:imageData.mediaType,data:imageData.base64}},{text:prompt}]
    : [{text:prompt}];
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:0.1}})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

// Components
function Ring({label,sublabel,current,max,color,unit,size=100}) {
  const r=size/2-10, circ=2*Math.PI*r, pct=max>0?Math.min(1,current/max):0;
  return (
    <div style={{textAlign:"center"}}>
      <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",overflow:"visible"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth="8"/>
          {pct>0&&<circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="8"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
            style={{filter:`drop-shadow(0 0 10px ${color}90)`,transition:"stroke-dashoffset 0.7s ease"}}/>}
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:18,fontWeight:600,color:T.text,letterSpacing:"-0.02em",lineHeight:1}}>
            {typeof current==="number"?current.toLocaleString():current}
          </div>
          {unit&&<div style={{fontSize:9,color:T.textSec,marginTop:2,textTransform:"uppercase",letterSpacing:"0.07em"}}>{unit}</div>}
        </div>
      </div>
      <div style={{fontSize:12,color:T.textSec,marginTop:8}}>{label}</div>
      {sublabel&&<div style={{fontSize:11,color,marginTop:2}}>{sublabel}</div>}
    </div>
  );
}

function ScoreRing({score}) {
  const size=140,r=size/2-12,circ=2*Math.PI*r,color=score>=7?T.green:score>=5?T.gold:T.warn;
  return (
    <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",overflow:"visible"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth="10"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="10"
          strokeDasharray={circ} strokeDashoffset={circ*(1-score/10)} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 14px ${color}A0)`,transition:"stroke-dashoffset 1s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:42,fontWeight:700,color,letterSpacing:"-0.04em",lineHeight:1}}>{score}</div>
        <div style={{fontSize:11,color:T.textSec,marginTop:3}}>/ 10</div>
      </div>
    </div>
  );
}

function Sheet({title,onClose,children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={onClose}>
      <div style={{background:T.card,borderRadius:"22px 22px 0 0",padding:"24px 20px 52px",width:"100%",maxWidth:480,margin:"0 auto",boxSizing:"border-box",maxHeight:"88vh",overflowY:"auto",border:`1px solid ${T.border}`}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:17,fontWeight:600}}>{title}</div>
          <button onClick={onClose} style={{color:T.textSec,background:T.card2,border:"none",width:30,height:30,borderRadius:"50%",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function TrendChart({data,dataKey,color,label,goal,unit}) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length) return;
    if(chartRef.current) chartRef.current.destroy();
    const valid = data.filter(d=>d[dataKey]!=null);
    if(!valid.length) return;
    chartRef.current = new Chart(ref.current, {
      type:"line",
      data:{
        labels:data.map(d=>d.date),
        datasets:[{
          data:data.map(d=>d[dataKey]),
          borderColor:color,borderWidth:2,pointRadius:0,
          pointHoverRadius:4,fill:false,tension:0.3,
          spanGaps:true,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>`${c.parsed.y!=null?c.parsed.y:"—"}${unit||""}`}}},
        scales:{
          x:{ticks:{color:T.textTer,font:{size:9},maxTicksLimit:6},grid:{display:false},border:{display:false}},
          y:{ticks:{color:T.textTer,font:{size:9},maxTicksLimit:5},grid:{color:T.border+"50"},border:{display:false}}
        },
        animation:{duration:600},
      }
    });
    if(goal) {
      chartRef.current.options.plugins.annotation = {annotations:{goal:{type:"line",yMin:goal,yMax:goal,borderColor:color+"60",borderWidth:1,borderDash:[4,4]}}};
    }
    return ()=>{ if(chartRef.current){chartRef.current.destroy();chartRef.current=null;} };
  },[data,dataKey,color]);
  return <canvas ref={ref} style={{width:"100%",height:130}}/>;
}

// Setup screen
function SetupScreen({onDone}) {
  const [key,setKey] = useState("");
  const [err,setErr] = useState("");
  const [testing,setTesting] = useState(false);
  async function save() {
    if(!key.trim()){setErr("Paste your API key above");return;}
    setTesting(true); setErr("");
    try {
      localStorage.setItem("gemini_key",key.trim());
      await gemini("Say OK");
      onDone();
    } catch(e) {
      setErr("Key didn't work — double check and try again");
      localStorage.removeItem("gemini_key");
    }
    setTesting(false);
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px",background:T.bg}}>
      <div style={{fontSize:40,marginBottom:20}}>✦</div>
      <div style={{fontSize:22,fontWeight:700,letterSpacing:"-0.03em",marginBottom:8}}>Welcome to Tracker</div>
      <div style={{fontSize:14,color:T.textSec,lineHeight:1.7,textAlign:"center",marginBottom:32,maxWidth:320}}>
        Paste your Gemini API key to power AI macro estimation, insights, and goal recommendations.
      </div>
      <input value={key} onChange={e=>setKey(e.target.value)} placeholder="Paste API key here"
        style={{width:"100%",maxWidth:360,background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",fontSize:14,color:T.text,outline:"none",marginBottom:12}}/>
      {err&&<div style={{fontSize:13,color:T.warn,marginBottom:12,textAlign:"center"}}>{err}</div>}
      <button onClick={save} disabled={testing}
        style={{width:"100%",maxWidth:360,background:testing?T.card2:T.green,color:testing?T.textSec:"#000",border:"none",borderRadius:14,padding:"14px 0",fontSize:15,fontWeight:700,cursor:testing?"not-allowed":"pointer",boxShadow:testing?"none":`0 0 20px ${T.green}60`}}>
        {testing?"Checking key…":"Get started →"}
      </button>
      <div style={{fontSize:12,color:T.textTer,marginTop:20,textAlign:"center",lineHeight:1.7}}>
        Your key is saved on this device only.<br/>Get a free key at aistudio.google.com
      </div>
    </div>
  );
}

// Main app

  const [meals,setMeals] = useState([]);

  const [trendData,setTrendData] = useState([]);
  const [trendLoading,setTrendLoading] = useState(false);

  const [insightsLoading,setInsightsLoading] = useState(false);

  const [goalDraft,setGoalDraft] = useState({calories:1600,protein:100,water:64});
  const [burnDraft,setBurnDraft] = useState("");
  const [goalRec,setGoalRec] = useState(null);
  const [goalRecLoading,setGoalRecLoading] = useState(false);
  const [fitnessGoal,setFitnessGoal] = useState("recomp");
  const [bodyWeight,setBodyWeight] = useState("");

  // Load from localStorage
  useEffect(()=>{
    const m=store.get(`meals:${today}`); if(m) setMeals(m);
    const w=store.get(`workouts:${today}`); if(w) setWorkouts(w);
    const g=store.get("goals"); if(g){setGoals(g);setGoalDraft(g);}
    const sm=store.get("savedMeals"); if(sm) setSavedMeals(sm);
    const ins=store.get(`insights:${today}`); if(ins) setInsights(ins);
    const b=store.raw(`burn:${today}`); if(b) setManualBurn(Number(b));
    const wt=store.raw(`water:${today}`); if(wt) setWaterOz(Number(wt));
    const entries=[];
    getLast30().forEach(day=>{const r=store.raw(`weight:${day}`);if(r)entries.push({date:day,weight:Number(r)});});
    setWeightEntries(entries);
  },[today]);

  useEffect(()=>{ store.set(`meals:${today}`,meals); },[meals]);
  useEffect(()=>{ store.set(`workouts:${today}`,workouts); },[workouts]);

  // Load week
  useEffect(()=>{
    if(view!=="week") return;
    (async()=>{
      setWeekLoading(true);
      const days=getWeekDays(),data={};
      days.forEach(day=>{
        data[day]={eaten:0,protein:0,burn:null,deficit:null};
        const m=store.get(`meals:${day}`);
        if(m){data[day].eaten=m.reduce((s,x)=>s+(x.calories||0),0);data[day].protein=m.reduce((s,x)=>s+(x.protein||0),0);}
        const b=store.raw(`burn:${day}`); if(b) data[day].burn=Number(b);
        if(data[day].burn!=null) data[day].deficit=data[day].burn-data[day].eaten;
      });
      setWeekData(data); setWeekLoading(false);
    })();
  },[view]);

  // Load trends
  useEffect(()=>{
    if(view!=="trends") return;
    (async()=>{
      setTrendLoading(true);
      const days=getLast30();
      const data=days.map(day=>{
        const entry={date:dayNum(day),deficit:null,protein:null,weight:null};
        const m=store.get(`meals:${day}`);
        if(m){
          entry.protein=m.reduce((s,x)=>s+(x.protein||0),0);
          const eaten=m.reduce((s,x)=>s+(x.calories||0),0);
          const b=store.raw(`burn:${day}`);
          if(b) entry.deficit=Number(b)-eaten;
        }
        const w=store.raw(`weight:${day}`); if(w) entry.weight=Number(w);
        return entry;
      });
      setTrendData(data); setTrendLoading(false);
    })();
  },[view]);

  function handlePhotoSelect(e) {
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{const r=ev.target.result;setPhotoData({base64:r.split(",")[1],mediaType:file.type,preview:r});};
    reader.readAsDataURL(file); e.target.value="";
  }

  async function logMeal() {
    if((!mealText.trim()&&!photoData)||aiLoading) return;
    setAiLoading(true);
    const desc=mealText.trim(),photo=photoData;
    setMealText(""); setPhotoData(null);
    try {
      const prompt=`Estimate nutrition for this meal${desc?`. Context: ${desc}`:""}.
Return ONLY valid JSON, nothing else: {"name":"short name","calories":0,"protein":0,"carbs":0,"fat":0}
All values must be integers. Use realistic serving sizes.`;
      const text=await gemini(prompt,photo||null);
      const clean=text.replace(/```json|```/g,"").trim();
      const macros=JSON.parse(clean);
      setMeals(p=>[...p,{id:Date.now(),time:fmtTime(),description:desc||"photo",photoPreview:photo?.preview,...macros}]);
    } catch(_) {
      setMeals(p=>[...p,{id:Date.now(),time:fmtTime(),description:desc||"photo",name:desc||"photo",calories:0,protein:0,carbs:0,fat:0,error:true}]);
    }
    setAiLoading(false);
  }

  function startEdit(m){setEditingMeal(m.id);setEditDraft({name:m.name||m.description,calories:m.calories,protein:m.protein,carbs:m.carbs,fat:m.fat});}
  function saveEdit(id){setMeals(p=>p.map(m=>m.id===id?{...m,...editDraft,calories:Number(editDraft.calories),protein:Number(editDraft.protein),carbs:Number(editDraft.carbs),fat:Number(editDraft.fat),error:false}:m));setEditingMeal(null);}
  async function saveMealFav(meal){const e={id:Date.now(),name:meal.name||meal.description,calories:meal.calories,protein:meal.protein,carbs:meal.carbs,fat:meal.fat};const u=[e,...savedMeals.filter(m=>m.name!==e.name)].slice(0,12);setSavedMeals(u);store.set("savedMeals",u);}
  function addSavedMeal(s){setMeals(p=>[...p,{id:Date.now(),time:fmtTime(),description:s.name,name:s.name,calories:s.calories,protein:s.protein,carbs:s.carbs,fat:s.fat}]);}
  function removeSavedMeal(id){const u=savedMeals.filter(m=>m.id!==id);setSavedMeals(u);store.set("savedMeals",u);}
  function logWorkout(){if(!workoutForm.type)return;setWorkouts(p=>[...p,{id:Date.now(),time:fmtTime(),...workoutForm}]);setWorkoutForm({type:"",duration:"",notes:""});}
  async function addWater(oz){const v=waterOz+oz;setWaterOz(v);store.setRaw(`water:${today}`,String(v));}
  async function removeWater(){const v=Math.max(0,waterOz-8);setWaterOz(v);store.setRaw(`water:${today}`,String(v));}
  async function logWeight(){const val=Number(weightDraft);if(!val)return;const updated=[...weightEntries.filter(e=>e.date!==today),{date:today,weight:val}].sort((a,b)=>a.date.localeCompare(b.date));setWeightEntries(updated);store.setRaw(`weight:${today}`,String(val));setShowWeightInput(false);setWeightDraft("");}

  async function generateInsights() {
    setInsightsLoading(true);
    try {
      const mS=meals.length>0?meals.map(m=>`${m.name||m.description}: ${m.calories}cal P${m.protein}g C${m.carbs}g F${m.fat}g`).join("; "):"none";
      const prompt=`You are a nutrition coach. Analyze this person's day and return ONLY valid JSON:
{"score":7,"highlight":"one encouraging sentence","gaps":["gap1","gap2","gap3"],"suggestions":["food1","food2","food3"],"macroNote":"one sentence about macro balance"}
Goals: protein ${goals.protein}g, calories ${goals.calories}.
Meals: ${mS}
Totals: ${eaten}cal, ${protein}g protein. Burn: ${manualBurn||"unknown"}. Water: ${waterOz}oz.
Be specific and practical. Max 3 gaps and 3 suggestions.`;
      const text=await gemini(prompt);
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setInsights(parsed); store.set(`insights:${today}`,parsed);
    } catch(e){console.error(e);}
    setInsightsLoading(false);
  }

  async function recommendGoals() {
    setGoalRecLoading(true);
    try {
      const days=getWeekDays(),recentData=[];
      days.forEach(day=>{
        const e={day,eaten:0,protein:0,burn:null,workoutCount:0};
        const m=store.get(`meals:${day}`);if(m){e.eaten=m.reduce((s,x)=>s+(x.calories||0),0);e.protein=m.reduce((s,x)=>s+(x.protein||0),0);}

        const w=store.get(`workouts:${day}`);if(w)e.workoutCount=w.length;
        if(e.eaten>0||e.burn)recentData.push(e);
      });

Avg protein: ${recentData.length?Math.round(recentData.reduce((s,d)=>s+d.protein,0)/recentData.length):"unknown"}g
Workouts/week: ${recentData.reduce((s,d)=>s+d.workoutCount,0)}
Days of data: ${recentData.length}`;
      const prompt=`You are a nutrition coach. Return ONLY valid JSON:
{"calories":0,"protein":0,"rationale":"2-3 sentences referencing their actual data"}
Goal: ${fitnessGoal}${bodyWeight?`\nWeight: ${bodyWeight} lbs`:""}
${summary}`;

  const waterGoalGlasses=Math.floor((goals.water||64)/8);
  const weekDays=getWeekDays();
  const weekDeficits=weekDays.map(d=>weekData[d]?.deficit).filter(d=>d!=null);
  const weekTotal=weekDeficits.reduce((s,d)=>s+d,0);
  const todayWeight=weightEntries.find(w=>w.date===today)?.weight;
  const prevWeights=weightEntries.filter(w=>w.date<today);
  const prevWeight=prevWeights.length>0?prevWeights[prevWeights.length-1].weight:null;
  const weightChange=todayWeight&&prevWeight?+(todayWeight-prevWeight).toFixed(1):null;
  const isSaved=m=>savedMeals.some(s=>s.name===(m.name||m.description));
  const logDisabled=(!mealText.trim()&&!photoData)||aiLoading;

  const card={background:T.card,borderRadius:18,padding:"16px 18px",border:`1px solid ${T.border}`,marginBottom:10};
  const iStyle={width:"100%",background:T.card2,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 14px",fontSize:14,color:T.text,outline:"none",boxSizing:"border-box",marginBottom:14};

  return (
    <div style={{fontFamily:"-apple-system,'Inter',system-ui,sans-serif",background:T.bg,minHeight:"100vh",color:T.text,maxWidth:480,margin:"0 auto",paddingBottom:52}}>

              </div>

            <div style={{...card,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0}}>
              {[["Weekly deficit",weekTotal!==0?(weekTotal>0?"+":"")+weekTotal.toLocaleString():"0","kcal",weekTotal>=0?T.teal:T.warn],["Avg deficit",weekDeficits.length>0?Math.round(weekTotal/weekDeficits.length).toLocaleString():"—","kcal/day",T.textSec],["Days tracked",`${weekDeficits.length}/7`,"",T.blue]].map(([label,value,unit,color],i)=>(

                    <div>
                      <div style={{fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:7}}>{dayShort(day)}{isToday&&<span style={{fontSize:9,color:T.blue,fontWeight:600,background:`${T.blue}25`,padding:"2px 7px",borderRadius:5}}>TODAY</span>}</div>

              </div>
              <TrendChart data={trendData} dataKey="protein" color={T.blue} unit="g" goal={goals.protein}/>
            </div>
            {weightEntries.length>1?(
              <div style={{...card}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontSize:10,color:T.textTer,textTransform:"uppercase",letterSpacing:"0.1em"}}>weight trend</div>
                  <div style={{fontSize:11,color:T.textSec}}>{(weightEntries[weightEntries.length-1].weight-weightEntries[0].weight).toFixed(1)} lbs change</div>
                </div>
                <TrendChart data={trendData.filter(d=>d.weight!=null)} dataKey="weight" color={T.gold} unit=" lbs"/>
              </div>
            ):(
              <div style={{...card,textAlign:"center",padding:"32px 20px"}}>
                <div style={{fontSize:28,marginBottom:12,opacity:0.3}}>⚖️</div>
                <div style={{fontSize:14,color:T.textSec,lineHeight:1.7}}>Log your weight daily to see your trend here.</div>
              </div>
            )}
            {trendData.some(d=>d.deficit!=null)&&(
              <div style={{...card,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[
                  ["Avg deficit",(()=>{const f=trendData.filter(d=>d.deficit!=null);return f.length?Math.round(f.reduce((s,d)=>s+d.deficit,0)/f.length)+" kcal":"—";})(),T.teal],
                  ["Avg protein",(()=>{const f=trendData.filter(d=>d.protein!=null);return f.length?Math.round(f.reduce((s,d)=>s+d.protein,0)/f.length)+"g":"—";})(),T.blue],
                  ["Days logged",trendData.filter(d=>d.deficit!=null).length+" / 30",T.textSec],
                  ["Protein goal hit",trendData.filter(d=>d.protein!=null&&d.protein>=goals.protein).length+" days",T.blue],
                ].map(([label,value,color])=>(
                  <div key={label} style={{background:T.card2,borderRadius:12,padding:"14px 16px",border:`1px solid ${T.border}`}}>
                    <div style={{fontSize:10,color:T.textTer,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{label}</div>
                    <div style={{fontSize:20,fontWeight:700,color,letterSpacing:"-0.02em"}}>{value}</div>
                  </div>
                ))}
              </div>
            )}
          </>)}
        </div>
      )}

      {/* INSIGHTS */}
      {view==="insights"&&(
        <div style={{padding:"0 18px"}}>
          <div style={{...card}}>
            <div style={{fontSize:13,color:T.textSec,lineHeight:1.7,marginBottom:10}}>AI analyzes your meals and identifies nutritional gaps.</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <span style={{fontSize:11,background:`${T.green}20`,color:T.green,padding:"3px 10px",borderRadius:20,border:`1px solid ${T.green}30`}}>{meals.length} meals</span>
              <span style={{fontSize:11,background:`${T.blue}20`,color:T.blue,padding:"3px 10px",borderRadius:20,border:`1px solid ${T.blue}30`}}>{eaten.toLocaleString()} kcal</span>
              <span style={{fontSize:11,background:`${T.blue}20`,color:T.blue,padding:"3px 10px",borderRadius:20,border:`1px solid ${T.blue}30`}}>{protein}g protein</span>
              {waterOz>0&&<span style={{fontSize:11,background:`${T.teal}20`,color:T.teal,padding:"3px 10px",borderRadius:20,border:`1px solid ${T.teal}30`}}>{waterOz}oz water</span>}
            </div>
          </div>
          {!insights&&!insightsLoading&&(
            <div style={{textAlign:"center",padding:"44px 20px"}}>
              <div style={{fontSize:42,marginBottom:16,opacity:0.3}}>✦</div>
              <div style={{fontSize:18,fontWeight:600,marginBottom:8}}>Nutrition insights</div>
              <div style={{fontSize:13,color:T.textSec,marginBottom:28,lineHeight:1.7}}>Identify gaps, missing micronutrients, and get specific food suggestions.</div>
              <button onClick={generateInsights} style={{background:T.blue,color:"#fff",border:"none",borderRadius:14,padding:"14px 32px",fontSize:14,fontWeight:600,cursor:"pointer",boxShadow:`0 0 20px ${T.blue}60`}}>Generate insights</button>
            </div>
          )}
          {insightsLoading&&<div style={{textAlign:"center",padding:"44px 0",color:T.textSec,fontSize:14}}><div style={{fontSize:32,marginBottom:14,opacity:0.3}}>✦</div>Analyzing…</div>}
          {insights&&!insightsLoading&&(<>
            <div style={{...card,textAlign:"center",padding:"28px 20px"}}>
              <ScoreRing score={insights.score}/>
              <div style={{fontSize:11,color:T.textTer,textTransform:"uppercase",letterSpacing:"0.1em",marginTop:16,marginBottom:8}}>nutrition score</div>
              <div style={{fontSize:15,color:T.textSec,lineHeight:1.6,maxWidth:280,margin:"0 auto"}}>{insights.highlight}</div>
            </div>
            <div style={{...card}}><div style={{fontSize:10,color:T.textTer,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>macro balance</div><div style={{fontSize:14,lineHeight:1.7}}>{insights.macroNote}</div></div>
            {insights.gaps?.length>0&&<div style={{...card}}><div style={{fontSize:10,color:T.textTer,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>potential gaps</div>{insights.gaps.map((g,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:i<insights.gaps.length-1?12:0}}><div style={{width:6,height:6,borderRadius:"50%",background:T.warn,flexShrink:0,marginTop:7,boxShadow:`0 0 6px ${T.warn}`}}/><div style={{fontSize:14,lineHeight:1.6}}>{g}</div></div>)}</div>}
            {insights.suggestions?.length>0&&<div style={{...card}}><div style={{fontSize:10,color:T.textTer,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>eat more of</div>{insights.suggestions.map((s,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:i<insights.suggestions.length-1?12:0}}><div style={{width:6,height:6,borderRadius:"50%",background:T.green,flexShrink:0,marginTop:7,boxShadow:`0 0 6px ${T.green}`}}/><div style={{fontSize:14,lineHeight:1.6}}>{s}</div></div>)}</div>}
            <button onClick={generateInsights} style={{width:"100%",background:"none",border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 0",fontSize:13,color:T.textSec,cursor:"pointer"}}>↻ Refresh insights</button>
          </>)}
        </div>
      )}

      {/* GOALS MODAL */}
      {modal==="goals"&&(
        <Sheet title="Daily goals" onClose={()=>{setModal(null);setGoalRec(null);}}>
          <label style={{fontSize:12,color:T.textSec,display:"block",marginBottom:6}}>Calorie goal</label>
          <input type="number" value={goalDraft.calories} onChange={e=>setGoalDraft(p=>({...p,calories:Number(e.target.value)}))} style={iStyle}/>
          <label style={{fontSize:12,color:T.textSec,display:"block",marginBottom:6}}>Protein goal (g)</label>
          <input type="number" value={goalDraft.protein} onChange={e=>setGoalDraft(p=>({...p,protein:Number(e.target.value)}))} style={iStyle}/>
          <label style={{fontSize:12,color:T.textSec,display:"block",marginBottom:6}}>Daily water goal (oz)</label>
          <input type="number" value={goalDraft.water||64} onChange={e=>setGoalDraft(p=>({...p,water:Number(e.target.value)}))} style={{...iStyle,marginBottom:16}}/>
          <button onClick={saveGoals} style={{width:"100%",background:T.green,color:"#000",border:"none",borderRadius:12,padding:"14px 0",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:`0 0 20px ${T.green}60`,marginBottom:24}}>Save</button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
            <div style={{flex:1,height:1,background:T.border}}/>
            <div style={{fontSize:10,color:T.textTer,letterSpacing:"0.1em",whiteSpace:"nowrap"}}>AI RECOMMENDATION</div>
            <div style={{flex:1,height:1,background:T.border}}/>
          </div>
          <label style={{fontSize:12,color:T.textSec,display:"block",marginBottom:6}}>What's your goal?</label>
          <select value={fitnessGoal} onChange={e=>{setFitnessGoal(e.target.value);setGoalRec(null);}} style={{...iStyle,cursor:"pointer",marginBottom:12}}>
            <option value="recomp">Body recomposition (build muscle + lose fat)</option>
            <option value="cut">Cut (lose fat, preserve muscle)</option>
            <option value="bulk">Lean bulk (build muscle)</option>
            <option value="maintain">Maintain current weight</option>
          </select>
          <label style={{fontSize:12,color:T.textSec,display:"block",marginBottom:6}}>Body weight <span style={{color:T.textTer}}>(optional)</span></label>
          <input type="number" value={bodyWeight} onChange={e=>{setBodyWeight(e.target.value);setGoalRec(null);}} placeholder="lbs" style={{...iStyle,marginBottom:16}}/>
          {!goalRec&&!goalRecLoading&&<button onClick={recommendGoals} style={{width:"100%",background:T.blue,color:"#fff",border:"none",borderRadius:12,padding:"14px 0",fontSize:14,fontWeight:600,cursor:"pointer",boxShadow:`0 0 20px ${T.blue}50`}}>✦ Recommend with AI</button>}
          {goalRecLoading&&<div style={{textAlign:"center",padding:"18px 0",color:T.textSec,fontSize:13}}>Analyzing your data…</div>}
          {goalRec&&!goalRecLoading&&(
            <div style={{background:`${T.blue}12`,border:`1px solid ${T.blue}35`,borderRadius:14,padding:"18px 16px"}}>
              <div style={{fontSize:10,color:T.blue,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>recommendation</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{textAlign:"center",background:T.card2,borderRadius:10,padding:"12px 8px"}}><div style={{fontSize:9,color:T.textTer,textTransform:"uppercase",marginBottom:4}}>calories</div><div style={{fontSize:26,fontWeight:700,color:T.green}}>{goalRec.calories?.toLocaleString()}</div><div style={{fontSize:9,color:T.textTer,marginTop:2}}>kcal / day</div></div>
                <div style={{textAlign:"center",background:T.card2,borderRadius:10,padding:"12px 8px"}}><div style={{fontSize:9,color:T.textTer,textTransform:"uppercase",marginBottom:4}}>protein</div><div style={{fontSize:26,fontWeight:700,color:T.blue}}>{goalRec.protein}</div><div style={{fontSize:9,color:T.textTer,marginTop:2}}>g / day</div></div>
              </div>
              <div style={{fontSize:13,color:T.textSec,lineHeight:1.7,marginBottom:16}}>{goalRec.rationale}</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setGoalDraft(p=>({...p,calories:goalRec.calories,protein:goalRec.protein}));setGoalRec(null);}} style={{flex:1,background:T.blue,color:"#fff",border:"none",borderRadius:10,padding:"12px 0",fontSize:13,fontWeight:600,cursor:"pointer"}}>Apply →</button>
                <button onClick={recommendGoals} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",fontSize:13,color:T.textSec,cursor:"pointer"}}>↻</button>
              </div>
            </div>
          )}
        </Sheet>
      )}

      {/* BURN MODAL */}
      {modal==="burn"&&(
        <Sheet title="Enter calories burned" onClose={()=>setModal(null)}>
          <label style={{fontSize:12,color:T.textSec,display:"block",marginBottom:6}}>Total calories burned today (from Oura app or estimate)</label>
          <input type="number" value={burnDraft} onChange={e=>setBurnDraft(e.target.value)} placeholder="e.g. 2100" style={{...iStyle,marginBottom:20}}/>
          <button onClick={saveBurn} disabled={!burnDraft} style={{width:"100%",background:burnDraft?T.green:T.card2,color:burnDraft?"#000":T.textTer,border:"none",borderRadius:12,padding:"14px 0",fontSize:14,fontWeight:700,cursor:burnDraft?"pointer":"not-allowed",boxShadow:burnDraft?`0 0 20px ${T.green}60`:"none"}}>Save</button>
        </Sheet>
      )}
    </div>
  );
}

function Root() {
  const [hasKey,setHasKey] = useState(!!localStorage.getItem("gemini_key"));
  if(!hasKey) return <SetupScreen onDone={()=>setHasKey(true)}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
